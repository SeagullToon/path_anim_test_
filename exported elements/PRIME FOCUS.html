<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prime Focus</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: "Josefin Slab", serif;
      display: flex;
      justify-content: center;
    }

    .section {
      width: 100%;
      max-width: 1200px;
      padding: 120px 20px 80px;
      color: white;
      text-align: center;
      position: relative;
    }

    .section-title {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 80px;
    }

    .content {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 80px;
      flex-wrap: wrap;
    }

    .circle-card {
      width: 330px;
      height: 330px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.32);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }

    .circle-inner {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .circle-inner h3 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
      color: #f9b233;
      letter-spacing: 4px;
    }

    .circle-inner p {
      margin: 0;
      font-size: 22px;
      line-height: 26px;
    }

    .side-image img {
      width: 320px;
      height: 320px;
      object-fit: contain;
    }
  </style>
</head>

<body>

<section class="section">

  <div class="section-title">PRIME FOCUS</div>

  <div class="content">

    <div class="circle-card">
      <div class="circle-inner">
        <h3>FOR INVESTORS</h3>
        <p>
          Allowing them to invest in social impact and acquire a prompt exit
        </p>
      </div>
    </div>

    <div class="side-image">
      <img src="img/PRIME_FOCUS/f.png" alt="">
    </div>

  </div>

</section>

</body>
</html>
