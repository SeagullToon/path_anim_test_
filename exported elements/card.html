<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Card</title>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
    }

    .card {
      width: 100%;
      max-width: 420px;
      padding: 60px 40px;
      border-radius: 40px;
      border: 3px solid rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      box-sizing: border-box;
    }

    .card img.top-image {
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .card p {
      margin: 0;
      color: white;
      font-size: 18px;
      line-height: 28px;
      text-align: center;
      letter-spacing: 2px;
    }

    .card img.icon {
      width: 80px;
      height: auto;
    }
  </style>
</head>

<body>

<div class="card">

  <img class="top-image" src="img/PRIME_FOCUS/f.png" alt="">

  <p>
    Cool info about company Cool info about company Cool info about company
    Cool info about company Cool info about company
  </p>

  <img class="icon" src="img/PRIME_FOCUS/f.png" alt="">

</div>

</body>
</html>
