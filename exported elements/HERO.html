<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

    <style>
        body {
            margin: 0;
            background: #000;
            font-family: "Inter", sans-serif;
        }

        .hero {
            width: 100%;
            max-width: 1440px;
            height: 702px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            color: #fff;
        }

        .hero img {
            width: 343px;
            height: 352px;
            object-fit: contain;
            margin-bottom: 40px;
        }

        .hero-title {
            font-family: "Josefin Slab", serif;
            font-weight: 700;
            font-size: 89px;
            letter-spacing: 7px;
            line-height: 1;
            text-shadow: 0 5px 5px rgba(0,0,0,0.5);
            margin: 0 0 40px 0;
        }

        .hero-subtitle {
            font-family: "Josefin Slab", serif;
            font-weight: 600;
            font-size: 29px;
            line-height: 32px;
            max-width: 1200px;
            margin: 0 0 60px 0;
        }

        .hero-button {
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.4);
            background: linear-gradient(
                    135deg,
                    rgba(250,225,50,1) 0%,
                    rgba(249,178,51,1) 100%
            );
            color: #000;
            transition: transform 0.2s ease;
        }

        .hero-button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<section class="hero">
    <img src="img/logo.png" alt="Hero image">

    <h1 class="hero-title">
        Venture Capital Advisory Services for Global Investors
    </h1>

    <p class="hero-subtitle">
        We foster the adoption of Core Values among global investors<br>
        to drive a new wave of impact investing in SMEs
    </p>

    <button class="hero-button">
        Nucleus Team
    </button>
</section>

</body>
</html>
